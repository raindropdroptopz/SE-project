<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รีเซ็ตรหัสผ่าน - Payap Sports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            position: relative;
            padding: 20px;
        }

        body::before {
            content: '';
            position: absolute;
            top: -15%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -20%;
            left: -10%;
            width: 600px;
            height: 600px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .reset-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 50px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .icon-circle i {
            font-size: 2.5rem;
            color: white;
        }

        .reset-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1c2e;
            margin-bottom: 15px;
        }

        .reset-card p {
            color: #6c7293;
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 30px;
        }

        .contact-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .contact-box h5 {
            font-weight: 600;
            color: #1a1c2e;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s;
            text-decoration: none;
            color: #1a1c2e;
        }

        .contact-item:hover {
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .contact-item i {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-item span {
            font-weight: 500;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-back:hover {
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
            color: white;
        }

        .tip-box {
            background: rgba(102, 126, 234, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            margin-top: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        .tip-box i {
            color: #667eea;
            font-size: 1.3rem;
        }

        .tip-box span {
            font-size: 0.9rem;
            color: #6c7293;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <div class="icon-circle"><i class="bi bi-key"></i></div>
        <h2>ลืมรหัสผ่าน?</h2>
        <p>หากคุณลืมรหัสผ่าน กรุณาติดต่อเจ้าหน้าที่เพื่อดำเนินการรีเซ็ตรหัสผ่านของคุณ</p>
        <div class="contact-box">
            <h5><i class="bi bi-headset"></i> ติดต่อเจ้าหน้าที่</h5>
            <a href="tel:0899999999" class="contact-item"><i class="bi bi-telephone"></i><span>08x-xxx-xxxx</span></a>
            <a href="mailto:support@payap.ac.th" class="contact-item"><i
                    class="bi bi-envelope"></i><span>support@payap.ac.th</span></a>
            <a href="#" class="contact-item"><i class="bi bi-clock"></i><span>จันทร์ - ศุกร์ 08:00 - 17:00</span></a>
        </div>
        <a href="/login.html" class="btn-back"><i class="bi bi-arrow-left"></i> กลับสู่หน้าเข้าสู่ระบบ</a>
        <div class="tip-box"><i class="bi bi-lightbulb"></i><span>เตรียมรหัสนักศึกษา/อาจารย์
                หรืออีเมลที่ลงทะเบียนไว้ให้พร้อมก่อนทำการรีเซ็ต</span></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
