<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รีเซ็ตรหัสผ่าน - Payap Sports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            position: relative;
            padding: 20px;
        }

        .reset-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 50px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
        }

        .icon-circle i {
            font-size: 2.5rem;
            color: white;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control-custom {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: #f5576c;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            transform: translateY(-2px);
        }

        .contact-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
            text-decoration: none;
            color: #1a1c2e;
        }

        .alert-custom {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <div class="icon-circle"><i class="bi bi-key"></i></div>
        
        <!-- กรณีมี Token (แสดงฟอร์มเปลี่ยนรหัส) -->
        <div id="tokenMode" style="display: none;">
            <h2>ตั้งรหัสผ่านใหม่</h2>
            <p>กรุณากรอกรหัสผ่านใหม่ที่คุณต้องการใช้งาน</p>
            <div id="alertBox" class="alert-custom"></div>
            <form id="resetForm">
                <div class="form-group">
                    <label for="password">รหัสผ่านใหม่</label>
                    <input type="password" id="password" class="form-control-custom" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">ยืนยันรหัสผ่านใหม่</label>
                    <input type="password" id="confirmPassword" class="form-control-custom" required minlength="6">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">ยืนยันการเปลี่ยนรหัสผ่าน</button>
            </form>
        </div>

        <!-- กรณีไม่มี Token (แสดงหน้าติดต่อเจ้าหน้าที่ตามเดิม) -->
        <div id="contactMode">
            <h2>ลืมรหัสผ่าน?</h2>
            <p>หากคุณลืมรหัสผ่าน กรุณาติดต่อเจ้าหน้าที่เพื่อดำเนินการรีเซ็ตรหัสผ่านของคุณ หรือ <a href="/forgot-password.html">ใช้ระบบรีเซ็ตผ่านอีเมล</a></p>
            <div class="contact-box">
                <h5><i class="bi bi-headset"></i> ติดต่อเจ้าหน้าที่</h5>
                <a href="tel:0899999999" class="contact-item"><i class="bi bi-telephone"></i><span>08x-xxx-xxxx</span></a>
                <a href="mailto:support@payap.ac.th" class="contact-item"><i class="bi bi-envelope"></i><span>support@payap.ac.th</span></a>
            </div>
            <a href="/login.html" class="btn btn-outline-secondary rounded-pill px-4">กลับสู่หน้าเข้าสู่ระบบ</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (token) {
                document.getElementById('contactMode').style.display = 'none';
                document.getElementById('tokenMode').style.display = 'block';
            }

            document.getElementById('resetForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newPassword = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const alertBox = document.getElementById('alertBox');
                const submitBtn = document.getElementById('submitBtn');

                if (newPassword !== confirmPassword) {
                    alertBox.style.display = 'block';
                    alertBox.style.backgroundColor = '#f8d7da';
                    alertBox.style.color = '#842029';
                    alertBox.textContent = 'รหัสผ่านไม่ตรงกัน';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'กำลังดำเนินการ...';

                try {
                    const response = await fetch('/api/auth/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, newPassword })
                    });

                    const data = await response.json();

                    if (data.success) {
                        alertBox.style.display = 'block';
                        alertBox.style.backgroundColor = '#d1e7dd';
                        alertBox.style.color = '#0f5132';
                        alertBox.textContent = data.message;
                        document.getElementById('resetForm').style.display = 'none';
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 3000);
                    } else {
                        alertBox.style.display = 'block';
                        alertBox.style.backgroundColor = '#f8d7da';
                        alertBox.style.color = '#842029';
                        alertBox.textContent = data.message;
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'ยืนยันการเปลี่ยนรหัสผ่าน';
                    }
                } catch (error) {
                    alertBox.style.display = 'block';
                    alertBox.style.backgroundColor = '#f8d7da';
                    alertBox.style.color = '#842029';
                    alertBox.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ';
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
