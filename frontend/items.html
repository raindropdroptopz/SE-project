<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ยืมอุปกรณ์กีฬา - Payap Sports</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        --secondary-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        --sidebar-bg: #1a1c2e;
        --sidebar-hover: #2d3154;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fa;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        width: 280px;
        height: 100vh;
        background: var(--sidebar-bg);
        padding: 20px;
        overflow-y: auto;
        z-index: 1050;
        transition: all 0.3s ease;
      }

      .sidebar-brand {
        display: flex;
        align-items: center;
        padding: 20px 10px;
        margin-bottom: 30px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        text-decoration: none;
      }

      .sidebar-brand img {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        margin-right: 15px;
      }

      .sidebar-brand h4 {
        color: #fff;
        font-weight: 600;
        margin: 0;
        font-size: 1.1rem;
      }

      .sidebar-brand span {
        color: #667eea;
        font-size: 0.8rem;
      }

      .nav-menu {
        list-style: none;
        padding: 0;
      }

      .nav-menu li {
        margin-bottom: 8px;
      }

      .nav-menu a {
        display: flex;
        align-items: center;
        padding: 14px 20px;
        color: #a4a6b3;
        text-decoration: none;
        border-radius: 12px;
        transition: all 0.3s ease;
      }

      .nav-menu a:hover,
      .nav-menu a.active {
        background: var(--sidebar-hover);
        color: #fff;
      }

      .nav-menu a.active {
        background: var(--primary-gradient);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .nav-menu i {
        font-size: 1.3rem;
        margin-right: 15px;
        width: 25px;
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(15px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        position: sticky;
        top: 0;
        z-index: 999;
      }

      .header-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1a1c2e;
        margin: 0;
      }

      .mobile-toggle {
        background: transparent;
        border: none;
        font-size: 1.5rem;
        color: #1a1c2e;
        cursor: pointer;
      }

      .page-header {
        background: var(--secondary-gradient);
        padding: 60px 0 100px;
        margin-bottom: -50px;
        position: relative;
        overflow: hidden;
      }

      .page-header::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -20%;
        width: 500px;
        height: 500px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
      }

      .page-header h1 {
        color: white;
        font-weight: 700;
        font-size: 2.3rem;
      }

      .page-header p {
        color: rgba(255, 255, 255, 0.85);
        font-size: 1.1rem;
      }

      .content-container {
        position: relative;
        z-index: 10;
        padding-bottom: 50px;
      }

      /* Main Content Wrapper */
      .main-content {
        margin-left: 280px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: all 0.3s ease;
        background: #f5f7fa;
      }

      .filter-card {
        background: white;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        margin-bottom: 30px;
      }

      .filter-card .form-control,
      .filter-card .form-select {
        border-radius: 10px;
        padding: 12px 18px;
        border: 2px solid #e8e8e8;
      }

      .filter-card .form-control:focus,
      .filter-card .form-select:focus {
        border-color: #11998e;
        box-shadow: 0 0 0 3px rgba(17, 153, 142, 0.1);
      }

      .btn-filter {
        padding: 12px 25px;
        background: var(--secondary-gradient);
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: 500;
        transition: all 0.3s;
      }

      .btn-filter:hover {
        box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        transform: translateY(-2px);
        color: white;
      }

      .equipment-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 25px;
      }

      .equipment-card {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        transition: all 0.3s;
      }

      .equipment-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      }

      .equipment-img {
        width: 100%;
        height: 200px;
        object-fit: cover;
      }

      .equipment-body {
        padding: 25px;
      }

      .equipment-category {
        display: inline-block;
        padding: 5px 12px;
        background: rgba(17, 153, 142, 0.1);
        color: #11998e;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .equipment-name {
        font-size: 1.2rem;
        font-weight: 700;
        color: #1a1c2e;
        margin-bottom: 8px;
      }

      .equipment-desc {
        color: #6c7293;
        font-size: 0.9rem;
        margin-bottom: 15px;
        line-height: 1.5;
      }

      .equipment-stock {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 15px;
      }

      .stock-badge {
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 500;
      }

      .stock-badge.available {
        background: rgba(56, 239, 125, 0.15);
        color: #11998e;
      }

      .stock-badge.low {
        background: rgba(255, 193, 7, 0.15);
        color: #e6a700;
      }

      .stock-badge.out {
        background: rgba(245, 87, 108, 0.15);
        color: #f5576c;
      }

      .equipment-actions {
        display: flex;
        gap: 10px;
      }

      .btn-borrow {
        flex: 1;
        padding: 12px;
        background: var(--secondary-gradient);
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: 600;
        transition: all 0.3s;
        text-decoration: none;
        text-align: center;
      }

      .btn-borrow:hover {
        box-shadow: 0 5px 20px rgba(17, 153, 142, 0.4);
        color: white;
      }

      .btn-detail {
        padding: 12px 18px;
        border: 2px solid #e8e8e8;
        border-radius: 10px;
        background: white;
        color: #6c7293;
        transition: all 0.3s;
        text-decoration: none;
      }

      .btn-detail:hover {
        border-color: #667eea;
        color: #667eea;
      }

      .quick-actions {
        background: white;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        margin-top: 30px;
      }

      .quick-actions h5 {
        font-weight: 600;
        margin-bottom: 20px;
        color: #1a1c2e;
      }

      .quick-action-grid {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .quick-action-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 15px 25px;
        border-radius: 12px;
        border: 2px solid #e8e8e8;
        background: white;
        color: #6c7293;
        text-decoration: none;
        transition: all 0.3s;
      }

      .quick-action-btn:hover {
        border-color: #667eea;
        color: #667eea;
      }

      .quick-action-btn i {
        font-size: 1.3rem;
      }

      @media (max-width: 992px) {
        .sidebar {
          transform: translateX(-100%);
        }

        .sidebar.show {
          transform: translateX(0);
        }

        .main-content {
          margin-left: 0;
        }
      }
    </style>
  </head>

  <body>
    <!-- Sidebar -->
    <aside class="sidebar">
      <a href="/index.html" class="sidebar-brand">
        <img
          src="https://www.payap.ac.th/site/wp-content/uploads/2023/09/Payap-Logo-Blue.png"
          alt="Logo"
        />
        <div>
          <h4>Payap Sports</h4>
          <span>ระบบจองสนามกีฬา</span>
        </div>
      </a>

      <ul class="nav-menu">
        <li>
          <a href="/index.html"><i class="bi bi-house-door"></i> หน้าหลัก</a>
        </li>
        <li>
          <a href="/sportarea.html"><i class="bi bi-dribbble"></i> สนามกีฬา</a>
        </li>
        <li>
          <a href="/items.html" class="active"
            ><i class="bi bi-box-seam"></i> ยืมอุปกรณ์</a
          >
        </li>
        <li>
          <a href="/calendar.html"><i class="bi bi-calendar3"></i> ปฏิทิน</a>
        </li>
        <!-- Logged in items -->
        <li class="logged-in-menu" style="display: none">
          <a href="/profile.html"
            ><i class="bi bi-person-circle"></i> โปรไฟล์</a
          >
        </li>
        <li class="logged-in-menu" style="display: none">
          <a href="/bookings.html"
            ><i class="bi bi-clock-history"></i> ประวัติการจอง</a
          >
        </li>
      </ul>
    </aside>

    <!-- Main Content wrapper -->
    <main class="main-content">
      <!-- Header -->
      <header class="header">
        <div class="d-flex align-items-center gap-3">
          <button
            class="mobile-toggle d-lg-none"
            onclick="
              document.querySelector('.sidebar').classList.toggle('show')
            "
          >
            <i class="bi bi-list"></i>
          </button>
          <h1 class="header-title d-none d-md-block">ยืมอุปกรณ์</h1>
        </div>
        <div class="d-flex gap-2" id="header-buttons">
          <!-- If not logged in, show login -->
          <a
            href="/login.html"
            class="btn btn-outline-primary rounded-pill px-4"
            >เข้าสู่ระบบ</a
          >
        </div>
      </header>

      <section class="page-header">
        <div class="container text-center">
          <h1><i class="bi bi-box-seam me-2"></i>ยืมอุปกรณ์กีฬา</h1>
          <p>เลือกอุปกรณ์กีฬาที่คุณต้องการยืมสำหรับกิจกรรมของคุณ</p>
        </div>
      </section>

      <div class="container content-container">
        <div class="filter-card">
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <input
                type="text"
                class="form-control"
                placeholder="ค้นหาอุปกรณ์..."
              />
            </div>
            <div class="col-md-3">
              <select class="form-select">
                <option value="">ประเภททั้งหมด</option>
                <option>ลูกบอล</option>
                <option>ไม้และแร็กเก็ต</option>
                <option>อุปกรณ์ฝึกซ้อม</option>
              </select>
            </div>
            <div class="col-md-3">
              <select class="form-select">
                <option value="">สถานะทั้งหมด</option>
                <option>พร้อมให้ยืม</option>
                <option>เหลือน้อย</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn-filter w-100">
                <i class="bi bi-search me-2"></i>ค้นหา
              </button>
            </div>
          </div>
        </div>

        <div class="equipment-grid">
          <!-- Data will be loaded via JavaScript -->
        </div>

        <div class="quick-actions">
          <h5><i class="bi bi-lightning-charge me-2"></i>ลิงก์ด่วน</h5>
          <div class="quick-action-grid">
            <a href="/calendar.html" class="quick-action-btn"
              ><i class="bi bi-calendar3"></i><span>ดูตารางการจอง</span></a
            >
            <a href="/index.html" class="quick-action-btn"
              ><i class="bi bi-dribbble"></i><span>จองสนามกีฬา</span></a
            >
            <a href="/profile.html" class="quick-action-btn"
              ><i class="bi bi-clock-history"></i><span>ประวัติการยืม</span></a
            >
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // ดึงข้อมูลอุปกรณ์จาก API
      async function loadEquipment() {
        try {
          const response = await fetch("/api/equipment");
          const data = await response.json();

          if (data.success && data.equipment) {
            renderEquipment(data.equipment);
          } else {
            console.error("Failed to load equipment");
          }
        } catch (error) {
          console.error("Error loading equipment:", error);
        }
      }

      function renderEquipment(equipment) {
        const container = document.querySelector(".equipment-grid");
        let htmlContent = "";

        equipment.forEach((item) => {
          // กำหนดสถานะ
          let statusClass = "available";
          let statusText = "พร้อมใช้งาน";
          let statusIcon = "check-circle";

          if (item.status === "low") {
            statusClass = "low";
            statusText = "เหลือน้อย";
            statusIcon = "exclamation-circle";
          } else if (item.status === "out" || item.available === 0) {
            statusClass = "out";
            statusText = "หมดชั่วคราว";
            statusIcon = "x-circle";
          }

          const isSell = item.type === "sell";
          const actionLabel = isSell ? `ซื้อ (฿${item.price})` : "ยืมอุปกรณ์";

          // ให้ไปหน้ารายละเอียดของอุปกรณ์ทั้งหมด (พื่อไปดูรายละเอียดหรือกดสั่งซื้อ)
          const actionLink = `/item-detail.html?id=${item.id}`;

          let badgeHtml = "";
          if (isSell) {
            badgeHtml = `<span class="badge bg-danger ms-2" style="font-size: 0.8rem;">ซื้อ ฿${item.price}</span>`;
          }

          const card = `
                    <div class="equipment-card">
                        <img class="equipment-img" src="${item.image_url || "/photo/default.jpg"}" alt="${item.name}">
                        <div class="equipment-body">
                            <span class="equipment-category">${item.category || "อื่นๆ"}</span>
                            <h3 class="equipment-name">${item.name} ${badgeHtml}</h3>
                            <p class="equipment-desc">${item.description || "ไม่มีคำอธิบาย"}</p>
                            <div class="equipment-stock">
                                <span class="stock-badge ${statusClass}">
                                    <i class="bi bi-${statusIcon} me-1"></i>${statusText}
                                </span>
                                <small class="text-muted">คงเหลือ ${item.available} ชิ้น</small>
                            </div>
                            <div class="equipment-actions">
                                ${
                                  item.available > 0
                                    ? `<a href="${actionLink}" class="btn-borrow" style="${isSell ? "background: #dc3545;" : ""}">${actionLabel}</a>`
                                    : `<button class="btn-borrow" style="opacity: 0.5; cursor: not-allowed;" disabled>หมดชั่วคราว</button>`
                                }
                                <a href="/item-detail.html?id=${item.id}" class="btn-detail"><i class="bi bi-eye"></i></a>
                            </div>
                        </div>
                    </div>
                `;
          htmlContent += card;
        });

        container.innerHTML = htmlContent;
      }

      function handleLogout() {
        localStorage.removeItem("isLoggedIn");
        localStorage.removeItem("userEmail");
        localStorage.removeItem("userName");
        localStorage.removeItem("userToken");
        localStorage.removeItem("isAdmin");
        localStorage.removeItem("adminToken");
        window.location.reload();
      }

      function updateHeaderButtons() {
        const headerButtons = document.getElementById("header-buttons");
        const isLoggedIn = localStorage.getItem("isLoggedIn") === "true";
        const isAdmin = localStorage.getItem("isAdmin") === "true";

        if (isLoggedIn && headerButtons) {
          document.querySelectorAll(".logged-in-menu").forEach((el) => (el.style.display = "block"));

          const profileLink = isAdmin ? "/admin-dashboard.html" : "/profile.html";

          const renderHeader = (name) => {
            headerButtons.innerHTML = `
                <a href="${profileLink}" class="btn btn-outline-primary rounded-pill px-4">
                    <i class="bi bi-person-circle me-1"></i> ${name || "โปรไฟล์"}
                </a>
                <button onclick="handleLogout()" class="btn btn-danger rounded-pill px-4">
                    <i class="bi bi-box-arrow-right me-1"></i> ออกจากระบบ
                </button>
            `;
          };

          renderHeader(localStorage.getItem("userName"));

          const token = localStorage.getItem("userToken");
          if (token) {
            fetch("/api/profile", { headers: { Authorization: `Bearer ${token}` } })
              .then((r) => r.json())
              .then((data) => {
                if (data.success && data.user) {
                  localStorage.setItem("userName", data.user.full_name);
                  renderHeader(data.user.full_name);
                }
              })
              .catch(() => {});
          }
        }
      }

      // โหลดข้อมูลเมื่อเริ่มต้น
      document.addEventListener("DOMContentLoaded", () => {
        loadEquipment();
        updateHeaderButtons();
      });
    </script>
  </body>
</html>
