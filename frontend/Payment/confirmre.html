<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ข้อมูลการจอง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css' rel='stylesheet' />

    <style>
        body {
            background-color: #f8f9fa;
        }

        .container {
            max-width: 960px;
            margin-top: 50px;
        }

        .card {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .status-badge {
            font-size: 0.8em;
            font-weight: bold;
        }

        .status-available {
            color: #28a745;
        }

        .status-unavailable {
            color: #dc3545;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card p-4 mb-4">
                    <h4 class="mb-3">เลือกวันที่จอง</h4>
                    <div id="calendar"></div>
                </div>

                <div class="card p-4">
                    <h4 class="mb-3">เลือกอุปกรณ์เพิ่มเติม</h4>
                    <div class="list-group mb-3" id="equipment-list">
                        <div class="list-group-item d-flex justify-content-between align-items-center"
                            data-item-name="ลูกฟุตบอล">
                            <label class="form-check-label">ลูกฟุตบอล</label>
                            <div class="input-group input-group-sm w-auto">
                                <button class="btn btn-outline-secondary btn-decrease" type="button"
                                    data-item="ball">-</button>
                                <input type="text" class="form-control text-center quantity-input" id="ball-input"
                                    value="0" readonly data-item-id="ball">
                                <button class="btn btn-outline-secondary btn-increase" type="button"
                                    data-item="ball">+</button>
                            </div>
                        </div>
                        <div class="list-group-item d-flex justify-content-between align-items-center"
                            data-item-name="ชุดกรวยฝึกซ้อม">
                            <label class="form-check-label">ชุดกรวยฝึกซ้อม</label>
                            <div class="input-group input-group-sm w-auto">
                                <button class="btn btn-outline-secondary btn-decrease" type="button"
                                    data-item="cones">-</button>
                                <input type="text" class="form-control text-center quantity-input" id="cones-input"
                                    value="0" readonly data-item-id="cones">
                                <button class="btn btn-outline-secondary btn-increase" type="button"
                                    data-item="cones">+</button>
                            </div>
                        </div>
                        <div class="list-group-item d-flex justify-content-between align-items-center"
                            data-item-name="นกหวีด">
                            <label class="form-check-label">นกหวีด</label>
                            <div class="input-group input-group-sm w-auto">
                                <button class="btn btn-outline-secondary btn-decrease" type="button"
                                    data-item="whistle">-</button>
                                <input type="text" class="form-control text-center quantity-input" id="whistle-input"
                                    value="0" readonly data-item-id="whistle">
                                <button class="btn btn-outline-secondary btn-increase" type="button"
                                    data-item="whistle">+</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card p-4">
                    <h4 class="mb-3">สถานะสนามและอุปกรณ์</h4>
                    <div id="status-display">
                        <p class="text-muted text-center">กรุณาเลือกวันและเวลาจากปฏิทิน</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js'></script>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/th.js'></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var calendarEl = document.getElementById('calendar');
            var statusEl = document.getElementById('status-display');
            let selectedDate = new Date().toISOString().slice(0, 10); // Store selected date
            let selectedSlot = null; // Store selected time slot

            // รายการช่วงเวลาทั้งหมดที่มีให้จอง
            const timeSlots = [
                { start: '08:00:00', end: '09:00:00', label: '08:00 - 09:00' },
                { start: '09:00:00', end: '10:00:00', label: '09:00 - 10:00' },
                { start: '10:00:00', end: '11:00:00', label: '10:00 - 11:00' },
                { start: '11:00:00', end: '12:00:00', label: '11:00 - 12:00' },
                { start: '12:00:00', end: '13:00:00', label: '12:00 - 13:00' },
                { start: '13:00:00', end: '14:00:00', label: '13:00 - 14:00' },
                { start: '14:00:00', end: '15:00:00', label: '14:00 - 15:00' },
                { start: '15:00:00', end: '16:00:00', label: '15:00 - 16:00' },
                { start: '16:00:00', end: '17:00:00', label: '16:00 - 17:00' }
            ];

            // เก็บข้อมูลการจองที่ดึงมาจาก API
            let existingBookings = [];

            // ดึงข้อมูลการจองทั้งหมด
            fetch('/api/bookings')
                .then(response => response.json())
                .then(data => {
                    existingBookings = data;
                    renderStatus(selectedDate);
                    calendar.addEventSource(data); // แสดงบนปฏิทินด้วย
                })
                .catch(err => console.error('Error fetching bookings:', err));

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'th',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                },
                selectable: true,
                dateClick: function (info) {
                    selectedDate = info.dateStr; // Update selected date
                    selectedSlot = null; // Reset selection

                    // Highlight selected day on calendar (visually)
                    document.querySelectorAll('.fc-daygrid-day').forEach(el => el.style.backgroundColor = '');
                    info.dayEl.style.backgroundColor = '#e8f0fe';

                    renderStatus(selectedDate);
                }
            });

            calendar.render();

            function renderStatus(date) {
                let content = '';
                content += `<p>สถานะสำหรับวันที่ <strong>${date}</strong></p>`;
                content += `<p class="text-muted small">กรุณาเลือกช่วงเวลาที่ต้องการจอง:</p>`;
                content += `<div class="list-group">`;

                // กรองการจองที่มีอยู่ในวันที่เลือก
                const bookedSlotsOnDate = existingBookings.filter(event => {
                    // event.start เป็น ISO string เช่น "2023-10-25T10:00:00"
                    return event.start.startsWith(date);
                });

                // สร้างรายการ Slot
                timeSlots.forEach(slot => {
                    // ตรวจสอบว่า Slot นี้ถูกจองไปหรือยัง
                    const isBooked = bookedSlotsOnDate.some(booking => {
                        const bookingStart = booking.start.split('T')[1]; // 10:00:00
                        return bookingStart === slot.start;
                    });

                    const statusClass = isBooked ? 'list-group-item-danger text-muted' : 'list-group-item-action';
                    const statusText = isBooked ? 'ไม่ว่าง' : 'ว่าง';
                    const pointer = isBooked ? '' : 'cursor: pointer;';
                    const clickHandler = isBooked ? '' : `onclick="selectSlot('${slot.start}', '${slot.end}', this)"`;

                    content += `
                <a href="javascript:void(0)" 
                   class="list-group-item d-flex justify-content-between align-items-center ${statusClass}" 
                   style="${pointer}"
                   ${clickHandler}
                   id="slot-${slot.start}">
                    <div>
                        <strong>${slot.label}</strong>
                    </div>
                    <span class="badge ${isBooked ? 'bg-danger' : 'bg-success'} rounded-pill">${statusText}</span>
                </a>`;
                });

                content += `</div>`;

                // ปุ่มยืนยัน (ซ่อนไว้ก่อนจนกว่าจะเลือก Slot)
                content += `
            <div id="confirm-section" class="mt-3" style="display:none;">
                <p><strong>เวลาที่เลือก:</strong> <span id="selected-time-display">-</span></p>
                <button id="proceed-to-confirm-btn" class="btn btn-primary w-100">ดำเนินการจอง</button>
            </div>
        `;

                statusEl.innerHTML = content;
            }

            // ฟังก์ชัน Global เพื่อให้ onclick ใน HTML เรียกใช้ได้
            window.selectSlot = function (start, end, element) {
                // Reset active class
                document.querySelectorAll('.list-group-item-action').forEach(el => {
                    el.classList.remove('active');
                    el.classList.remove('text-white');
                });

                // Set active
                element.classList.add('active');
                element.classList.add('text-white');

                // Save selection
                selectedSlot = { start, end };

                // Show confirm button
                document.getElementById('confirm-section').style.display = 'block';
                document.getElementById('selected-time-display').textContent = `${start.substring(0, 5)} - ${end.substring(0, 5)}`;
            };

            // Event Delegation สำหรับปุ่ม proceed (เนื่องจากสร้างด้วย innerHTML)
            statusEl.addEventListener('click', function (event) {
                if (event.target && event.target.id === 'proceed-to-confirm-btn') {
                    if (!selectedSlot) {
                        alert('กรุณาเลือกช่วงเวลา');
                        return;
                    }

                    const equipment = {};
                    const equipmentInputs = document.querySelectorAll('.quantity-input');

                    equipmentInputs.forEach(input => {
                        const itemId = input.dataset.itemId;
                        const quantity = parseInt(input.value);
                        if (quantity > 0) {
                            equipment[itemId] = quantity;
                        }
                    });

                    const urlParams = new URLSearchParams();
                    for (const item in equipment) {
                        urlParams.append(item, equipment[item]);
                    }

                    // เพิ่มข้อมูลวันที่และเวลา
                    urlParams.append('court_type', 'สนามฟุตบอลและลู่วิ่ง'); // Default ไว้ก่อน
                    urlParams.append('date', selectedDate);
                    urlParams.append('start_time', selectedSlot.start);
                    urlParams.append('end_time', selectedSlot.end);

                    window.location.href = `confirm.html?${urlParams.toString()}`;
                }
            });

            // Handle quantity buttons (เหมือนเดิม)
            document.addEventListener('click', function (event) {
                if (event.target && event.target.classList.contains('btn-increase')) {
                    const inputId = event.target.dataset.item + '-input';
                    const inputElement = document.getElementById(inputId);
                    let currentValue = parseInt(inputElement.value);
                    inputElement.value = currentValue + 1;
                }

                if (event.target && event.target.classList.contains('btn-decrease')) {
                    const inputId = event.target.dataset.item + '-input';
                    const inputElement = document.getElementById(inputId);
                    let currentValue = parseInt(inputElement.value);
                    if (currentValue > 0) {
                        inputElement.value = currentValue - 1;
                    }
                }
            });
        });
    </script>

</body>

</html>
