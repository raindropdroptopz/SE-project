<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลืมรหัสผ่าน - Payap Sports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            padding: 20px;
        }

        body::before {
            content: '';
            position: absolute;
            top: -15%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .reset-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }

        .icon-circle i {
            font-size: 2rem;
            color: white;
        }

        .reset-card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a1c2e;
            margin-bottom: 10px;
        }

        .reset-card p {
            color: #6c7293;
            margin-bottom: 30px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control-custom {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .form-control-custom:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #6c7293;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            color: #667eea;
        }

        .alert-custom {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="reset-card">
        <div class="icon-circle"><i class="bi bi-envelope-at"></i></div>
        <h2>ลืมรหัสผ่าน</h2>
        <p>กรุณากรอกอีเมลที่ใช้ลงทะเบียน เพื่อรับลิงก์สำหรับรีเซ็ตรหัสผ่าน</p>

        <div id="alertBox" class="alert-custom"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">อีเมล</label>
                <input type="email" id="email" class="form-control-custom" placeholder="example@payap.ac.th" required>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
        </form>

        <a href="/login.html" class="back-link"><i class="bi bi-arrow-left"></i> กลับสู่หน้าเข้าสู่ระบบ</a>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const submitBtn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('alertBox');

            submitBtn.disabled = true;
            submitBtn.textContent = 'กำลังส่ง...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    alertBox.style.display = 'block';
                    alertBox.style.backgroundColor = '#d1e7dd';
                    alertBox.style.color = '#0f5132';
                    alertBox.textContent = data.message;
                    document.getElementById('forgotForm').style.display = 'none';
                } else {
                    alertBox.style.display = 'block';
                    alertBox.style.backgroundColor = '#f8d7da';
                    alertBox.style.color = '#842029';
                    alertBox.textContent = data.message;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'ส่งลิงก์รีเซ็ตรหัสผ่าน';
                }
            } catch (error) {
                alertBox.style.display = 'block';
                alertBox.style.backgroundColor = '#f8d7da';
                alertBox.style.color = '#842029';
                alertBox.textContent = 'เกิดข้อผิดพลาดในการเชื่อมต่อ';
                submitBtn.disabled = false;
                submitBtn.textContent = 'ส่งลิงก์รีเซ็ตรหัสผ่าน';
            }
        });
    </script>
</body>

</html>
